[global/wm]
margin-top = 0
margin-bottom = 0

[bar/main]
width = 100%
height = 24
offset-x = 0
offset-y = 0
background = #1a1a1a
foreground = #ffffff
line-size = 2
line-color = #ffffff
border-size = 0
border-color = #000000
padding-left = 0
padding-right = 0
module-margin-left = 2
module-margin-right = 2
font-0 = "Font Awesome 6 Free:style=Solid:size=10;2"
font-1 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
modules-left = memory temperature language volume network
modules-right = clock power
tray-padding = 2
tray-position = right

[module/memory]
type = custom/script
exec = ~/.local/bin/blocks/memory
interval = 5
format = <label>
format-foreground = #ffffff
label = %output%

[module/temperature]
type = custom/script
exec = ~/.local/bin/blocks/temperature
interval = 5
format = <label>
format-foreground = #ff9e64
label = %output%

[module/language]
type = custom/script
exec = ~/.local/bin/blocks/language
interval = 0
format = <label>
format-foreground = #bb9af7
label = %output%
click-right = ~/.local/bin/blocks/kbd &

[module/volume]
type = custom/script
exec = ~/.local/bin/blocks/pulseaudio
interval = 0
format = <label>
format-foreground = #7aa2f7
label = %output%
click-left = ~/.local/bin/scripts/vol-toggle

[module/network]
type = custom/script
exec = ~/.local/bin/blocks/network
interval = 30
format = <label>
format-foreground = #7dcfff
label = %output%

[module/clock]
type = custom/script
exec = ~/.local/bin/blocks/clock
interval = 60
format = <label>
format-foreground = #c0caf5
label = %output%

[module/power]
type = custom/script
exec = ~/.local/bin/blocks/power
interval = 0
format = <label>
format-foreground = #f7768e
label = %output%
click-left = wlogout